info:
  name: Cancel scheduled transfer
  type: http
  seq: 2
  tags:
    - Transfers

http:
  method: DELETE
  url: "{{baseUrl}}/transfers/scheduled/:id"
  params:
    - name: id
      value: ""
      type: path
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Scheduled transfer cancelled successfully
    request:
      url: "{{baseUrl}}/transfers/scheduled/:id"
      method: DELETE
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "cancelled_id": "123e4567-e89b-12d3-a456-426614174001"
          }
  - name: 400 Response
    description: Bad request - invalid UUID
    request:
      url: "{{baseUrl}}/transfers/scheduled/:id"
      method: DELETE
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "Bad request",
            "message": "invalid id",
            "status_code": 400
          }
  - name: 400 Response
    description: Bad request - transfer already executed
    request:
      url: "{{baseUrl}}/transfers/scheduled/:id"
      method: DELETE
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "Bad request",
            "message": "Transfer already executed",
            "status_code": 400
          }
  - name: 400 Response
    description: Bad request - too late to cancel
    request:
      url: "{{baseUrl}}/transfers/scheduled/:id"
      method: DELETE
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "Bad request",
            "message": "Too late to cancel transfer",
            "status_code": 400
          }
  - name: 403 Response
    description: Forbidden - transfer belongs to another user
    request:
      url: "{{baseUrl}}/transfers/scheduled/:id"
      method: DELETE
    response:
      status: 403
      statusText: Forbidden
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "Forbidden",
            "message": "Transfer belongs to another user",
            "status_code": 403
          }
  - name: 404 Response
    description: Not found - transfer not found
    request:
      url: "{{baseUrl}}/transfers/scheduled/:id"
      method: DELETE
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "Transfer was not found",
            "message": "Transfer was not found",
            "status_code": 404
          }
  - name: 401 Response
    description: Unauthorized - missing or invalid token
    request:
      url: "{{baseUrl}}/transfers/scheduled/:id"
      method: DELETE
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "unauthorized",
            "message": "Missing or invalid authorization token",
            "status_code": 401
          }
