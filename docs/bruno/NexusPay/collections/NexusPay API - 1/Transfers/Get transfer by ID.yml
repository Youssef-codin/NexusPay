info:
  name: Get transfer by ID
  type: http
  seq: 3
  tags:
    - Transfers

http:
  method: GET
  url: "{{baseUrl}}/transfers/:id"
  params:
    - name: id
      value: ""
      type: path
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Transfer retrieved successfully
    request:
      url: "{{baseUrl}}/transfers/:id"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "transfer": {
              "id": "123e4567-e89b-12d3-a456-426614174001",
              "amount_in_piastres": 5000,
              "status": "completed",
              "note": "Dinner split",
              "created_at": "2024-01-15T10:30:00Z"
            }
          }
  - name: 400 Response
    description: Bad request - invalid UUID
    request:
      url: "{{baseUrl}}/transfers/:id"
      method: GET
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "Bad request",
            "message": "invalid id",
            "status_code": 400
          }
  - name: 404 Response
    description: Not found - transfer not found
    request:
      url: "{{baseUrl}}/transfers/:id"
      method: GET
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "Transfer was not found",
            "message": "Transfer was not found",
            "status_code": 404
          }
  - name: 401 Response
    description: Unauthorized - missing or invalid token
    request:
      url: "{{baseUrl}}/transfers/:id"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "unauthorized",
            "message": "Missing or invalid authorization token",
            "status_code": 401
          }
