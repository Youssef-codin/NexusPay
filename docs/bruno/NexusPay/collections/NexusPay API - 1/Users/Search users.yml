info:
  name: Search users
  type: http
  seq: 1
  tags:
    - Users

http:
  method: GET
  url: "{{baseUrl}}/users?name=John"
  params:
    - name: name
      value: John
      type: query
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Users found
    request:
      url: "{{baseUrl}}/users?name=John"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: ""
  - name: 401 Response
    description: Unauthorized - missing or invalid token
    request:
      url: "{{baseUrl}}/users?name=John"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
          "error": "unauthorized",
          "message": "Missing or invalid authorization token",
          "status_code": 401
          }
