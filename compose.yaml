services:
  server:
    image: cosmtrek/air
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://joe-arch:password@db:5432/nexuspay
      - REDIS_URL=redis://redis:6379
      - PORT=3000
      - GIN_MODE=release
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: joe-arch
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nexuspay
    ports:
      - "5433:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U joe-arch -d todo"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db-data:
  redis-data:
